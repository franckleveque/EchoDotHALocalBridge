services:
  hue-bridge-emulator:
    build: .
    container_name: hue-bridge-emulator
    restart: unless-stopped
    # network_mode: host is REQUIRED for SSDP on Linux/RPi.
    # On Mac/Windows (Docker Desktop), host mode does not map to localhost.
    # In that case, comment out network_mode and uncomment the ports section below for testing.
    network_mode: host
    # ports:
    #   - "80:80"
    #   - "1900:1900/udp"
    volumes:
      - ./data:/data
    environment:
      - CONFIG_PATH=/data/config.json
      - LOG_LEVEL=DEBUG
    cap_add:
      - NET_BIND_SERVICE
