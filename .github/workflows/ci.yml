name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Unit & ArchUnit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
      - name: Run Unit Tests
        run: go test -v -coverprofile=coverage.out ./...
      - name: Run E2E Tests
        run: go test -v -tags e2e ./internal/e2e/...
      - name: Code Coverage Report
        run: go tool cover -func=coverage.out
      - name: Verify Coverage
        run: |
          # Domain coverage must be 100%
          go test -v -coverprofile=domain.out ./internal/domain/... || exit 1
          DOMAIN_COV=$(go tool cover -func=domain.out | grep total | awk '{print $3}' | sed 's/%//')
          echo "Domain Coverage: $DOMAIN_COV%"
          if [ "$DOMAIN_COV" != "100.0" ]; then
            echo "Domain coverage must be 100%"
            exit 1
          fi

          # Global coverage (excluding non-testable adapters) should be >= 50%
          TESTABLE_PKGS=$(go list ./... | grep -v 'adapters/input/ssdp' \
                                      | grep -v 'adapters/input/http' \
                                      | grep -v 'adapters/output/homeassistant' \
                                      | grep -v 'cmd/bridge' \
                                      | tr '\n' ' ')
          go test -v -coverprofile=global.out $TESTABLE_PKGS || exit 1
          GLOBAL_COV=$(go tool cover -func=global.out | grep total | awk '{print $3}' | sed 's/%//')
          echo "Global (testable) Coverage: $GLOBAL_COV%"
          if [ "$(echo "$GLOBAL_COV 50" | awk '{if ($1 < $2) print 1; else print 0}')" -eq 1 ]; then
            echo "Global (testable) coverage is below 50%"
            exit 1
          fi

  build:
    name: Build & Scan
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build Local Image for Scanning
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: hue-bridge-emulator:scan
          load: true
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'hue-bridge-emulator:scan'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'
      - name: Build Multi-arch Image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: false
          tags: hue-bridge-emulator:latest
